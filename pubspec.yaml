name: nosiva
description: "Nosiva — a community marketplace for buying & selling pre-loved fashion. 💖"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # --- State management ---
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # --- Routing ---
  go_router: ^14.6.2

  # --- Backend (Supabase: Auth, Postgres, Storage, Realtime) ---
  supabase_flutter: ^2.8.0

  # --- Models / serialization ---
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # --- UI / theming ---
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # --- Media ---
  image_picker: ^1.1.2

  # --- Location ---
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # --- Config / utils ---
  flutter_dotenv: ^5.2.1
  intl: '>=0.19.0 <0.21.0'
  uuid: ^4.5.1
  collection: ^1.18.0
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.6.3

flutter:
  generate: true
  uses-material-design: true
  assets:
    - .env
    - assets/images/
